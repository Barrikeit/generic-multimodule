security:
  enabled: true
  max-concurrent-sessions: 5
  cors:
    allowed:
      origins: http://localhost:9891,http://localhost:4200
      methods: GET,HEAD,POST,PUT,DELETE,OPTIONS
      headers: "Authorization,content-type,app-called-service,access-token,refresh-token"
    enabled: true
    path:
      pattern: /**
  jwt:
    issuer: keit
    # Override with JWT_SECRET env var in production; fallback is dev-only and must not reach prod
    secret: ${JWT_SECRET:keit_secret}
    expiration: 600 # 10 mins
    expiration-refresh: 900 # 15 mins
  rate-limit:
    enabled: true
    capacity: 5
    refill-tokens: 5
    refill-period-minutes: 1
  app-validator-filter:
    app-header-name-validation-Filter: true # habilita la validación de cabeceras
    app-header-name: 'app-called-service' # nombre de la cabecera que tiene el identificador
    app-self-name: 'generic-rest' # nombre del módulo que espera recibir
    app-security-name: 'generic-security' # nombre del módulo de seguridad